name: Atualizar SIFC

on:

  schedule:
    - cron: '50 14 * * *'

  workflow_dispatch:

jobs:

  download:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Instalar pacotes

        run: |

          install.packages(c(
            "RSelenium",
            "wdman",
            "fs"
          ))

        shell: Rscript {0}

      - name: Executar script

        run: Rscript R/baixar_sifc.R

      - name: Commit

        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add dados/

          git diff --cached --quiet || git commit -m "Atualização automática SIFC"

          git push
