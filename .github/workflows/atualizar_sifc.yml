name: Atualizar dados SIFC (SINAN/DATASUS)

on:
  schedule:
    # Toda segunda-feira às 06:00 UTC (~03:00 horário de Brasília)
    - cron: '0 6 * * 1'
  workflow_dispatch: {}   # permite rodar manualmente pela aba "Actions" do GitHub

permissions:
  contents: write   # necessário para o job poder dar commit/push no repositório

jobs:
  atualizar-sifc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        # persist-credentials fica true por padrão, o que permite ao
        # `git push` dentro do script R se autenticar com o GITHUB_TOKEN
        # gerado automaticamente para este workflow.

      - name: Configurar R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - name: Instalar dependências de sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev build-essential
          # build-essential (gcc/make) é necessário para compilar o pacote
          # read.dbc a partir do fonte, já que ele foi removido do CRAN e
          # precisa ser instalado via remotes::install_github().

      - name: Cache de pacotes R
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ runner.os }}-${{ hashFiles('R/baixar_sifc.R') }}
          restore-keys: |
            r-pkgs-${{ runner.os }}-

      - name: Rodar script de extração e atualização do SIFC
        run: Rscript R/baixar_sifc.R
